<div class="missions">
    <h1>Here see the missions</h1>
<p class="highlight-demo" appHighlights="#e4ea71">
    Hover over for surprise!
</p>

    <div class="mission-grid" >
        @for (mission of missions; track mission.id) {
        <div class="mission-card" appHighlights [status]="mission.status" >
            <div class="mission-status status-{{ mission.status }}">
              <span [appStatusStyle]="mission.status">{{ mission.status }}</span>  
            </div>
            <h3>{{ mission.name }}</h3>
            <p class="destination">{{ mission.destination }}</p>
            <p class="launch-date">Launch: {{ mission.launchDate }}</p>
            <p class="crew">Crew: {{ mission.crew }} astronauts</p>

            <a [routerLink]="['/missions', mission.id]" class="details-btn">
                View Details
            </a>
        </div>
        }
    </div>
</div>
